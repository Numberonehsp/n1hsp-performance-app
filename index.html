<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>N1 HSP Performance Testing</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/entry.css">
  <link rel="stylesheet" href="css/reports.css">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://apis.google.com/js/api.js" async defer></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2/dist/chartjs-plugin-datalabels.min.js" defer></script>
</head>
<body>

  <div id="view-signin" class="view">
    <div class="signin-card">
      <div class="brand-lockup">
        <img src="assests/logo-light.jpg" alt="Number ONE — Health · Strength · Performance" class="brand-logo">
      </div>
      <h1>Performance Testing</h1>
      <button type="button" id="btn-signin" class="btn-primary btn-large">Sign in with Google</button>
    </div>
  </div>

  <div id="view-dashboard" class="view hidden">
    <header class="app-header">
      <img src="assests/logo-white.png" alt="Number ONE HSP" class="brand-logo-header">
      <button type="button" id="btn-signout" class="btn-text">Sign out</button>
    </header>
    <main id="dashboard-content" class="content-area"></main>
  </div>

  <div id="view-entry" class="view hidden">
    <header class="app-header">
      <button type="button" class="btn-back" onclick="history.back()">← Back</button>
      <span id="entry-title" class="header-title"></span>
      <button type="button" id="btn-save-session" class="btn-primary" disabled>Save</button>
    </header>
    <div id="player-strip-container"></div>
    <main id="entry-form-container" class="content-area"></main>
  </div>

  <div id="view-team-report" class="view hidden">
    <header class="app-header no-print">
      <button type="button" class="btn-back" onclick="history.back()">← Back</button>
      <span class="header-title">Team Report</span>
      <button type="button" class="btn-primary" onclick="window.print()">Print / PDF</button>
    </header>
    <main id="team-report-content"></main>
  </div>

  <div id="view-player-report" class="view hidden">
    <header class="app-header no-print">
      <button type="button" class="btn-back" onclick="history.back()">← Back</button>
      <span class="header-title">Player Report</span>
      <button type="button" class="btn-primary" onclick="window.print()">Print / PDF</button>
    </header>
    <main id="player-report-content"></main>
  </div>

  <div id="view-print-all" class="view hidden">
    <header class="app-header no-print">
      <button type="button" class="btn-back" onclick="history.back()">← Back</button>
      <span class="header-title">All Player Reports</span>
      <button type="button" class="btn-primary" onclick="window.print()">Print / PDF</button>
    </header>
    <main id="print-all-content"></main>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
